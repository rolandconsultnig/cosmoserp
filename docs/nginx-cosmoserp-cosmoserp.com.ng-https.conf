# CosmosERP HTTPS - cosmoserp.com.ng
# Pure ASCII. Replace /root/cosmoserp with your repo path.
# Use AFTER cert exists: /etc/letsencrypt/live/cosmoserp.com.ng/
#
# Install:
#   sudo cp THIS_FILE /etc/nginx/sites-available/cosmoserp
#   sudo sed -i 's|/root/cosmoserp|/YOUR/PATH/cosmoserp|g' /etc/nginx/sites-available/cosmoserp
#   sudo ln -sf /etc/nginx/sites-available/cosmoserp /etc/nginx/sites-enabled/cosmoserp
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name cosmoserp.com.ng www.cosmoserp.com.ng;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cosmoserp.com.ng www.cosmoserp.com.ng;

    ssl_certificate /etc/letsencrypt/live/cosmoserp.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cosmoserp.com.ng/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # If nginx -t says ssl-dhparams missing: sudo openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
    # Then add: ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /root/cosmoserp/apps/marketplace/dist;
    index index.html;

    location /api {
        proxy_pass http://127.0.0.1:5133;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        alias /root/cosmoserp/apps/admin/dist/;
        try_files $uri $uri/ @admin_fallback;
        index index.html;
    }
    location @admin_fallback {
        root /root/cosmoserp/apps/admin/dist;
        try_files /index.html =404;
    }

    location = /erp {
        return 301 /erp/;
    }
    location /erp/ {
        alias /root/cosmoserp/apps/erp/dist/;
        try_files $uri $uri/ @erp_fallback;
        index index.html;
    }
    location @erp_fallback {
        root /root/cosmoserp/apps/erp/dist;
        try_files /index.html =404;
    }

    location = /logistic-login {
        return 301 /erp/logistics-login;
    }
    location = /logistics-login {
        return 301 /erp/logistics-login;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 10M;
}
