# CosmosERP HTTPS - cosmoserp.com.ng — PROXY TO LOCAL PORTS
# Server: 13.53.33.63 — DNS A (@ and www) -> this IP. Browsers use :80 and :443 only.
#
# Route map (Nginx on this host forwards by path to services on 127.0.0.1):
#
#   Web address                              Backend on this server
#   --------------------------------------   ----------------------------------------
#   http://cosmoserp.com.ng/  (port 80)      -> 301 redirect to HTTPS
#   https://cosmoserp.com.ng/  (port 443)    -> 127.0.0.1:5173  (same as 13.53.33.63:5173 locally)
#   https://cosmoserp.com.ng/erp/            -> 127.0.0.1:3060  (same as 13.53.33.63:3060 locally)
#   https://cosmoserp.com.ng/admin/          -> 127.0.0.1:5175  (same as 13.53.33.63:5175 locally)
#   https://cosmoserp.com.ng/api/            -> 127.0.0.1:5133  (API)
#   https://cosmoserp.com.ng/uploads/        -> 127.0.0.1:5133
#
# Do NOT open 3060, 5173, 5175, 5133 on the public firewall; only Nginx (80/443) should be public.
# Apps should listen on 127.0.0.1 (or all interfaces blocked by firewall except localhost).
#
# Requires: API :5133, Marketplace :5173, ERP :3060, Admin :5175 (e.g. PM2)
#
# Static build (serve dist/ instead): use nginx-cosmoserp-cosmoserp.com.ng-https-static-dist.conf
#
# Install:
#   sudo cp /path/to/cosmoserp/docs/nginx-cosmoserp-cosmoserp.com.ng-https.conf /etc/nginx/sites-available/cosmoserp
#   sudo ln -sf /etc/nginx/sites-available/cosmoserp /etc/nginx/sites-enabled/cosmoserp
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name cosmoserp.com.ng www.cosmoserp.com.ng;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cosmoserp.com.ng www.cosmoserp.com.ng;

    ssl_certificate /etc/letsencrypt/live/cosmoserp.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cosmoserp.com.ng/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # If nginx -t says ssl-dhparams missing:
    #   sudo openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
    #   ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    client_max_body_size 10M;

    # API
    location /api {
        proxy_pass http://127.0.0.1:5133;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
    }

    # Uploaded files served by API
    location /uploads {
        proxy_pass http://127.0.0.1:5133;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Admin (Vite dev uses base / — strip /admin/ prefix for upstream)
    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        proxy_pass http://127.0.0.1:5175/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # ERP (Vite base /erp/)
    location = /erp {
        return 301 /erp/;
    }
    # Pass full URI /erp/... to Vite (base /erp/ on port 3060)
    location /erp/ {
        proxy_pass http://127.0.0.1:3060;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    location = /logistic-login {
        return 301 /erp/logistics-login;
    }
    location = /logistics-login {
        return 301 /erp/logistics-login;
    }

    # Marketplace (root)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }
}
