# CosmosERP — Production (full config for /etc/nginx/sites-available/cosmoserp)
#
# Routes:
#   :80/                  → Marketplace
#   :80/admin             → Admin app
#   :80/erp               → ERP app
#   :80/api               → API (proxied to 127.0.0.1:5133)
#   :80/logistic-login     → redirects to /erp/logistics-login
#
# Paths use /root/cosmoserp; change to /home/ubuntu/cosmoserp if your repo is there.
#
# If you get 500 Internal Server Error: Nginx (www-data) must be able to read the
# dist folders. On the server run (repo path as used below):
#   sudo chmod 755 /root
#   sudo chmod -R o+rX /root/cosmoserp/apps/marketplace/dist /root/cosmoserp/apps/admin/dist /root/cosmoserp/apps/erp/dist
# Then: sudo nginx -t && sudo systemctl reload nginx
# Check logs: sudo tail -20 /var/log/nginx/error.log

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 13.53.33.63;

    root /root/cosmoserp/apps/marketplace/dist;
    index index.html;

    # API — proxy to Node.js (must listen on 5133)
    location /api {
        proxy_pass http://127.0.0.1:5133;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Admin app
    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        alias /root/cosmoserp/apps/admin/dist/;
        try_files $uri $uri/ @admin_fallback;
        index index.html;
    }
    location @admin_fallback {
        root /root/cosmoserp/apps/admin/dist;
        try_files /index.html =404;
    }

    # ERP app
    location = /erp {
        return 301 /erp/;
    }
    location /erp/ {
        alias /root/cosmoserp/apps/erp/dist/;
        try_files $uri $uri/ @erp_fallback;
        index index.html;
    }
    location @erp_fallback {
        root /root/cosmoserp/apps/erp/dist;
        try_files /index.html =404;
    }

    # Logistics login — short URL redirects to ERP logistics login page
    location = /logistic-login {
        return 301 /erp/logistics-login;
    }
    location = /logistics-login {
        return 301 /erp/logistics-login;
    }

    # Marketplace (primary at /)
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 10M;
}
