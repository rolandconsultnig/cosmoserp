# CosmosERP - cosmoserp.com.ng
# ASCII-only comments (avoid Certbot "invalid character" if file was saved with BOM/smart quotes).
# Replace /root/cosmoserp with your repo path before use.
#
# DNS: cosmoserp.com.ng and www must A-record to THIS server's public IP (dig +short cosmoserp.com.ng).
# SSL: certbot --nginx OR certonly --webroot (see docs/CERTBOT-TROUBLESHOOTING-COSMOSERP.md).

server {
    listen 80;
    listen [::]:80;
    server_name cosmoserp.com.ng www.cosmoserp.com.ng;

    root /root/cosmoserp/apps/marketplace/dist;
    index index.html;

    # Let's Encrypt HTTP-01 (use with: mkdir -p /var/www/certbot && certbot certonly --webroot -w /var/www/certbot ...)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location /api {
        proxy_pass http://127.0.0.1:5133;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        alias /root/cosmoserp/apps/admin/dist/;
        try_files $uri $uri/ @admin_fallback;
        index index.html;
    }
    location @admin_fallback {
        root /root/cosmoserp/apps/admin/dist;
        try_files /index.html =404;
    }

    location = /erp {
        return 301 /erp/;
    }
    location /erp/ {
        alias /root/cosmoserp/apps/erp/dist/;
        try_files $uri $uri/ @erp_fallback;
        index index.html;
    }
    location @erp_fallback {
        root /root/cosmoserp/apps/erp/dist;
        try_files /index.html =404;
    }

    location = /logistic-login {
        return 301 /erp/logistics-login;
    }
    location = /logistics-login {
        return 301 /erp/logistics-login;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 10M;
}
