# CosmosERP HTTPS - cosmoserp.com.ng — STATIC FILES (dist/)
# Use this when Nginx serves built assets from apps/*/dist (no Node dev servers).
# See nginx-cosmoserp-cosmoserp.com.ng-https.conf for proxy-to-local-ports mode.

server {
    listen 80;
    listen [::]:80;
    server_name cosmoserp.com.ng www.cosmoserp.com.ng;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cosmoserp.com.ng www.cosmoserp.com.ng;

    ssl_certificate /etc/letsencrypt/live/cosmoserp.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cosmoserp.com.ng/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /root/cosmoserp/apps/marketplace/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /api {
        proxy_pass http://127.0.0.1:5133;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        alias /root/cosmoserp/apps/admin/dist/;
        try_files $uri $uri/ @admin_fallback;
        index index.html;
    }
    location @admin_fallback {
        root /root/cosmoserp/apps/admin/dist;
        try_files /index.html =404;
    }

    location = /erp {
        return 301 /erp/;
    }
    location /erp/ {
        alias /root/cosmoserp/apps/erp/dist/;
        try_files $uri $uri/ @erp_fallback;
        index index.html;
    }
    location @erp_fallback {
        root /root/cosmoserp/apps/erp/dist;
        try_files /index.html =404;
    }

    location = /logistic-login {
        return 301 /erp/logistics-login;
    }
    location = /logistics-login {
        return 301 /erp/logistics-login;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 10M;
}
